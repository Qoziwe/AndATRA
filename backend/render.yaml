services:
  - type: web
    name: andatra-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/scripts/render_start.py
    healthCheckPath: /api/ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: ENFORCE_API_AUTH
        value: "true"
      - key: AUTO_SEED_REFERENCE_DATA
        value: "true"
      - key: SEED_MOCK_DATA_ON_DEPLOY
        sync: true
      - key: CORS_ORIGINS
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_SECRET
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_DISPLAY_NAME
        value: Operator AndATRA
      - key: AUTH_TOKEN_MAX_AGE_HOURS
        value: "24"
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_LLM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PRIMARY_URL
        sync: false
      - key: LLM_CLASSIFY_URL
        sync: false
      - key: LLM_VISION_URL
        sync: false
      - key: LLM_PRIMARY_MODEL
        value: llama3
      - key: LLM_CLASSIFY_MODEL
        value: mistral
      - key: LLM_VISION_MODEL
        value: llava
