name: Deploy Frontend To GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate public backend URL
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ vars.EXPO_PUBLIC_BACKEND_URL }}
        run: |
          if [ -z "$EXPO_PUBLIC_BACKEND_URL" ]; then
            echo "Set the EXPO_PUBLIC_BACKEND_URL repository variable before deploying the frontend." >&2
            exit 1
          fi

      - name: Export frontend for GitHub Pages
        working-directory: frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ vars.EXPO_PUBLIC_BACKEND_URL }}
          EXPO_PUBLIC_APP_NAME: AndATRA
          EXPO_PUBLIC_TOMTOM_API_KEY: ${{ vars.EXPO_PUBLIC_TOMTOM_API_KEY }}
          EXPO_PUBLIC_AIR_QUALITY_API_URL: ${{ vars.EXPO_PUBLIC_AIR_QUALITY_API_URL }}
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_CNAME: ${{ vars.GITHUB_PAGES_CNAME }}
        run: npm run build:github-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
